<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spinor CAD 3D</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #d2e4fe;
      --ui: #1b2638;
      --ui-sub: rgba(27, 38, 56, 0.72);
      --line: rgba(27, 38, 56, 0.18);
      --btn-bg: rgba(255, 255, 255, 0.30);
      --btn-bg-hover: rgba(255, 255, 255, 0.42);
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--ui);
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
      transition: background 260ms linear, color 260ms linear;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 18% 15%, rgba(255,255,255,0.32), transparent 26%),
        radial-gradient(circle at 81% 18%, rgba(255,255,255,0.18), transparent 22%),
        radial-gradient(circle at 50% 84%, rgba(255,255,255,0.13), transparent 28%);
      mix-blend-mode: screen;
      opacity: 0.86;
    }
    #app { position: fixed; inset: 0; }
    canvas { display: block; width: 100%; height: 100%; }

    #collision-layer {
      position: fixed;
      inset: 0;
      z-index: 9;
      pointer-events: none;
      overflow: hidden;
    }
    .collision-word {
      position: absolute;
      left: 0;
      top: 0;
      transform: translate(-50%, -50%);
      color: var(--ui);
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-weight: 300;
      font-size: 11px;
      line-height: 1;
      letter-spacing: 0.01em;
      white-space: nowrap;
      opacity: 0.92;
      will-change: transform, opacity;
      transition: color 260ms ease;
      text-shadow: 0 0 10px rgba(255,255,255,0.08);
    }
    .headline {
      position: fixed;
      top: 28px;
      left: 30px;
      z-index: 10;
      pointer-events: none;
      max-width: 430px;
    }
    .headline .eyebrow {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--ui-sub);
      margin-bottom: 10px;
    }
    .headline h1 {
      margin: 0;
      font-size: clamp(30px, 4vw, 54px);
      line-height: 0.96;
      letter-spacing: -0.05em;
      font-weight: 500;
      color: var(--ui);
    }
    .headline p {
      margin: 12px 0 0;
      max-width: 320px;
      font-size: 13px;
      line-height: 1.55;
      color: var(--ui-sub);
    }
    .home-button {
      position: fixed;
      top: 28px;
      right: 30px;
      z-index: 11;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 36px;
      padding: 0 16px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--btn-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      color: var(--ui);
      text-decoration: none;
      font-size: 12px;
      font-weight: 500;
      line-height: 1;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: background 160ms ease, border-color 160ms ease, transform 160ms ease, color 260ms ease;
    }
    .home-button:hover {
      transform: translateY(-1px);
      background: var(--btn-bg-hover);
      border-color: rgba(27, 38, 56, 0.34);
    }
    @media (max-width: 760px) {
      .headline { top: 18px; left: 18px; max-width: 260px; }
      .headline h1 { font-size: 34px; }
      .headline p { font-size: 12px; }
      .home-button { top: 18px; right: 18px; height: 34px; padding: 0 14px; }
    }
  </style>
</head>
<body>
  <a class="home-button" href="./index.html">Home</a>
  <div class="headline">
    <div class="eyebrow">Spinor</div>
    <h1>Hold it and<br>let it fly.</h1>
    <p>Start with one spinor. Double-click it to duplicate.</p>
  </div>
  <div id="app"></div>
  <div id="collision-layer" aria-hidden="true"></div>

      const clean = hex.replace('#', '');
      const full = clean.length === 3 ? clean.split('').map(ch => ch + ch).join('') : clean;

    function createTopMapsFromReference() {

      const rCtx = roughCanvas.getContext('2d');
      aCtx.fillStyle = '#14181f';
      aCtx.fillRect(0, 0, w, h);
      bCtx.fillStyle = 'rgb(122,122,122)';
      bCtx.fillRect(0, 0, w, h);
      rCtx.fillStyle = 'rgb(192,192,192)';
      rCtx.fillRect(0, 0, w, h);

        const tex = new THREE.CanvasTexture(canvas);
        tex.wrapS = tex.wrapT = THREE.ClampToEdgeWrapping;
        tex.anisotropy = renderer.capabilities.getMaxAnisotropy();
        tex.colorSpace = colorSpace;
        tex.needsUpdate = true;
        return tex;

        albedo: createTexture(albedoCanvas, THREE.SRGBColorSpace),
        bump: createTexture(bumpCanvas, THREE.NoColorSpace),

        textures.bump.needsUpdate = true;
        textures.roughness.needsUpdate = true;

          aCtx.fillStyle = `rgba(${darkA}, ${darkA + 2}, ${darkA + 5}, 0.98)`;
          aCtx.fillRect(x, y, cell, cell / 2);
          aCtx.fillStyle = `rgba(${darkB}, ${darkB + 3}, ${darkB + 8}, 0.98)`;
          aCtx.fillRect(x, y + cell / 2, cell, cell / 2);

          aCtx.strokeStyle = 'rgba(88, 96, 112, 0.40)';
          aCtx.lineWidth = 1.2;
          aCtx.beginPath();
          aCtx.moveTo(x - 1, y + cell * 0.16);
          aCtx.lineTo(x + cell + 1, y + cell * 0.66);
          aCtx.stroke();
          aCtx.beginPath();
          aCtx.moveTo(x - 1, y + cell * 0.84);
          aCtx.lineTo(x + cell + 1, y + cell * 0.34);
          aCtx.stroke();

          const bumpTop = 148 + Math.random() * 18;
          const bumpBottom = 104 + Math.random() * 18;
          bCtx.fillStyle = `rgba(${bumpTop}, ${bumpTop}, ${bumpTop}, 0.98)`;
          bCtx.fillRect(x, y, cell, cell / 2);
          bCtx.fillStyle = `rgba(${bumpBottom}, ${bumpBottom}, ${bumpBottom}, 0.98)`;
          bCtx.fillRect(x, y + cell / 2, cell, cell / 2);

          bCtx.strokeStyle = 'rgba(166,166,166,0.40)';
          bCtx.lineWidth = 1;
          bCtx.beginPath();
          bCtx.moveTo(x, y + cell * 0.2);
          bCtx.lineTo(x + cell, y + cell * 0.7);
          bCtx.stroke();
          bCtx.beginPath();
          bCtx.moveTo(x, y + cell * 0.8);
          bCtx.lineTo(x + cell, y + cell * 0.3);
          bCtx.stroke();

          const roughTop = 158 + Math.random() * 16;
          const roughBottom = 122 + Math.random() * 16;
          rCtx.fillStyle = `rgba(${roughTop}, ${roughTop}, ${roughTop}, 0.96)`;
          rCtx.fillRect(x, y, cell, cell / 2);
          rCtx.fillStyle = `rgba(${roughBottom}, ${roughBottom}, ${roughBottom}, 0.96)`;
          rCtx.fillRect(x, y + cell / 2, cell, cell / 2);
        }
      }

      for (let i = 0; i < 16000; i++) {
        const x = Math.random() * size;
        const y = Math.random() * size;
        const radius = Math.random() * 0.65 + 0.12;
        const dark = 6 + Math.random() * 16;
        aCtx.fillStyle = `rgba(${dark}, ${dark + 2}, ${dark + 4}, ${0.018 + Math.random() * 0.03})`;
        aCtx.beginPath();
        aCtx.arc(x, y, radius, 0, Math.PI * 2);
        aCtx.fill();
      }

      const makeTexture = (canvas, colorSpace = THREE.NoColorSpace) => {
        const tex = new THREE.CanvasTexture(canvas);
        tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
        tex.repeat.set(2.35, 2.35);
        tex.anisotropy = renderer.capabilities.getMaxAnisotropy();
        tex.colorSpace = colorSpace;
        tex.needsUpdate = true;
        return tex;
      };

      return {
        albedo: makeTexture(albedoCanvas, THREE.SRGBColorSpace),
        bump: makeTexture(bumpCanvas, THREE.NoColorSpace),
        roughness: makeTexture(roughCanvas, THREE.NoColorSpace),
      };
    }

    const SHAPE_UV_BOUNDS = { minX: -327.5, maxX: 327.5, minY: -435.0, maxY: 435.0 };
    const SHAPE_UV_RANGE_X = SHAPE_UV_BOUNDS.maxX - SHAPE_UV_BOUNDS.minX;
    const SHAPE_UV_RANGE_Y = SHAPE_UV_BOUNDS.maxY - SHAPE_UV_BOUNDS.minY;

    const CustomUVGenerator = {
      generateTopUV: function (geometry, vertices, indexA, indexB, indexC) {
        const ax = vertices[indexA * 3];
        const ay = vertices[indexA * 3 + 1];
        const bx = vertices[indexB * 3];
        const by = vertices[indexB * 3 + 1];
        const cx = vertices[indexC * 3];
        const cy = vertices[indexC * 3 + 1];
        return [
          new THREE.Vector2((ax - SHAPE_UV_BOUNDS.minX) / SHAPE_UV_RANGE_X, (ay - SHAPE_UV_BOUNDS.minY) / SHAPE_UV_RANGE_Y),
          new THREE.Vector2((bx - SHAPE_UV_BOUNDS.minX) / SHAPE_UV_RANGE_X, (by - SHAPE_UV_BOUNDS.minY) / SHAPE_UV_RANGE_Y),
          new THREE.Vector2((cx - SHAPE_UV_BOUNDS.minX) / SHAPE_UV_RANGE_X, (cy - SHAPE_UV_BOUNDS.minY) / SHAPE_UV_RANGE_Y),
        ];
      },
      generateSideWallUV: function (geometry, vertices, indexA, indexB, indexC, indexD) {
        const ax = vertices[indexA * 3], ay = vertices[indexA * 3 + 1], az = vertices[indexA * 3 + 2];
        const bx = vertices[indexB * 3], by = vertices[indexB * 3 + 1], bz = vertices[indexB * 3 + 2];
        const cx = vertices[indexC * 3], cy = vertices[indexC * 3 + 1], cz = vertices[indexC * 3 + 2];
        const dx = vertices[indexD * 3], dy = vertices[indexD * 3 + 1], dz = vertices[indexD * 3 + 2];
        const useX = Math.abs(ax - bx) > Math.abs(ay - by);
        return [
          new THREE.Vector2((useX ? ax : ay) / 80, az / 16.5),
          new THREE.Vector2((useX ? bx : by) / 80, bz / 16.5),
          new THREE.Vector2((useX ? cx : cy) / 80, cz / 16.5),
          new THREE.Vector2((useX ? dx : dy) / 80, dz / 16.5),
        ];
      }
    };

    
    function chaikinSmoothClosed(points, iterations = 1, ratio = 0.25) {
      let result = points.map(p => [p[0], p[1]]);
      for (let iter = 0; iter < iterations; iter++) {
        const next = [];
        for (let i = 0; i < result.length; i++) {
          const p0 = result[i];
          const p1 = result[(i + 1) % result.length];
          const qx = (1 - ratio) * p0[0] + ratio * p1[0];
          const qy = (1 - ratio) * p0[1] + ratio * p1[1];
          const rx = ratio * p0[0] + (1 - ratio) * p1[0];
          const ry = ratio * p0[1] + (1 - ratio) * p1[1];
          next.push([qx, qy], [rx, ry]);
        }
        result = next;
      }
      return result;
    }

    function addClosedPathFromPoints(target, points) {
      points.forEach((pt, idx) => {
        if (idx === 0) target.moveTo(pt[0], pt[1]);
        else target.lineTo(pt[0], pt[1]);
      });
      target.closePath();
    }

    function scalePointsAroundCentroid(points, sx = 1, sy = 1) {
      let cx = 0;
      let cy = 0;
      for (const p of points) {
        cx += p[0];
        cy += p[1];
      }
      cx /= points.length;
      cy /= points.length;
      return points.map(([x, y]) => [
        cx + (x - cx) * sx,
        cy + (y - cy) * sy
      ]);
    }

function buildSpinnerGeometry() {
      const smoothOuter = chaikinSmoothClosed(OUTER_POINTS, 2, 0.18);
      const smoothHoles = HOLE_POINTS.map(points =>
        scalePointsAroundCentroid(
          chaikinSmoothClosed(points, 1, 0.18),
          1.28,
          1.28
        )
      );

      const shape = new THREE.Shape();
      addClosedPathFromPoints(shape, smoothOuter);

      smoothHoles.forEach(holeArray => {
        const hole = new THREE.Path();
        addClosedPathFromPoints(hole, holeArray);
        shape.holes.push(hole);
      });

      const geometry = new THREE.ExtrudeGeometry(shape, {
        depth: 10.6,
        steps: 1,
        bevelEnabled: true,
        bevelThickness: 0.96,
        bevelSize: 0.68,
        bevelOffset: 0,
        bevelSegments: 20,
        curveSegments: 56,
        UVGenerator: CustomUVGenerator,
      });

      // Slimmer, more refined silhouette.
      geometry.scale(0.918, 1.09, 1.0);
      geometry.center();
      geometry.computeVertexNormals();
      return geometry;
    }

    const topMaps = createTopMapsFromReference();
    const carbonMaps = createCarbonMaps();
    const geometry = buildSpinnerGeometry();

    const frontMaterial = new THREE.MeshPhysicalMaterial({
      color: 0x1a1d23,
      roughness: 0.44,
      metalness: 0.02,
      clearcoat: 0.52,
      clearcoatRoughness: 0.22,
      ior: 1.48,
      specularIntensity: 0.58,
      map: topMaps.albedo,
      bumpMap: topMaps.bump,
      bumpScale: 0.92,
      roughnessMap: topMaps.roughness,
    });

    const sideMaterial = new THREE.MeshPhysicalMaterial({
      color: 0x0d1015,
      roughness: 0.48,
      metalness: 0.04,
      clearcoat: 0.38,
      clearcoatRoughness: 0.22,
      ior: 1.54,
      specularIntensity: 0.56,
      map: carbonMaps.albedo,
      bumpMap: carbonMaps.bump,
      bumpScale: 0.62,
      roughnessMap: carbonMaps.roughness,
    });

    function makeSpinnerMesh() {
      const mesh = new THREE.Mesh(geometry, [frontMaterial, sideMaterial]);
      const baseScale = window.innerWidth < 760 ? 0.255 : 0.335;
      mesh.scale.set(baseScale * 0.912, baseScale * 1.092, baseScale * 0.952);
      mesh.castShadow = false;
      mesh.receiveShadow = false;
      return mesh;
    }

    const state = {
      width: window.innerWidth,
      height: window.innerHeight,
      spinners: [],
      drag: null,
      lastTime: performance.now(),
      throwLevel: 0,
      bgBlend: 0,
      nextId: 1,
      lastTextSpawn: 0,
    };

    function screenToWorld(x, y) {
      return new THREE.Vector3(x - state.width / 2, state.height / 2 - y, 0);
    }

    function worldToScreen(x, y) {
      return { x: x + state.width / 2, y: state.height / 2 - y };
    }

    function createSpinner(options = {}) {
      const group = new THREE.Group();
      const mesh = makeSpinnerMesh();
      group.add(mesh);
      scene.add(group);

      const scale = window.innerWidth < 760 ? 0.242 : 0.318;
      const baseRadius = SHAPE_BOUNDS.width * scale * 0.48;
      const spinner = {
        id: `spinner-${state.nextId++}`,
        group,
        mesh,
        x: options.x ?? 0,
        y: options.y ?? 0,
        vx: options.vx ?? 0,
        vy: options.vy ?? 0,
        rx: options.rx ?? -0.55,
        ry: options.ry ?? 0.3,
        rz: options.rz ?? -0.8,
        vrx: options.vrx ?? 0,
        vry: options.vry ?? 0,
        vrz: options.vrz ?? 0,
        scale,
        scaleX: scale * 0.912,
        scaleY: scale * 1.092,
        scaleZ: scale * 0.952,
        radius: baseRadius * 0.936,
        thickness: 10.6 * scale,
        grabbed: false,
      };
      state.spinners.push(spinner);
      renderSpinner(spinner);
      return spinner;
    }

    function bringToFront(spinner) {
      const idx = state.spinners.findIndex(s => s.id === spinner.id);
      if (idx >= 0) {
        state.spinners.splice(idx, 1);
        state.spinners.push(spinner);
      }
    }

    function renderSpinner(spinner) {
      const pos = screenToWorld(spinner.x, spinner.y);
      spinner.group.position.set(pos.x, pos.y - spinner.thickness * 0.125, 0);
      spinner.group.rotation.set(spinner.rx, spinner.ry, spinner.rz);
      const speed = Math.hypot(spinner.vx, spinner.vy);
      spinner.mesh.scale.set(spinner.scaleX, spinner.scaleY, spinner.scaleZ);
      spinner.group.position.z = 24 + speed * 0.068;
    }

    function findSpinnerAt(x, y) {
      for (let i = state.spinners.length - 1; i >= 0; i--) {
        const s = state.spinners[i];
        const dx = x - s.x;
        const dy = y - s.y;
        if (Math.hypot(dx, dy) <= s.radius) return s;
      }
      return null;
    }

    function pointerPos(event) {
      return { x: event.clientX, y: event.clientY };
    }

    renderer.domElement.addEventListener('pointerdown', (event) => {
      const pos = pointerPos(event);
      const spinner = findSpinnerAt(pos.x, pos.y);
      if (!spinner) return;
      renderer.domElement.setPointerCapture(event.pointerId);
      spinner.grabbed = true;
      spinner.vx = spinner.vy = spinner.vrx = spinner.vry = spinner.vrz = 0;
      bringToFront(spinner);
      state.drag = {
        id: spinner.id,
        offsetX: pos.x - spinner.x,
        offsetY: pos.y - spinner.y,
        lastX: pos.x,
        lastY: pos.y,
        samples: [{ x: pos.x, y: pos.y, t: performance.now() }],
      };
      renderSpinner(spinner);
    });

    renderer.domElement.addEventListener('pointermove', (event) => {
      if (!state.drag) return;
      const spinner = state.spinners.find(s => s.id === state.drag.id);
      if (!spinner) return;
      const pos = pointerPos(event);
      spinner.x = clamp(pos.x - state.drag.offsetX, spinner.radius, state.width - spinner.radius);
      spinner.y = clamp(pos.y - state.drag.offsetY, spinner.radius, state.height - spinner.radius);

      const dx = pos.x - state.drag.lastX;
      const dy = pos.y - state.drag.lastY;
      spinner.ry = clamp(spinner.ry + dx * 0.0075, -1.3, 1.3);
      spinner.rx = clamp(spinner.rx - dy * 0.0062, -1.2, 1.2);
      spinner.rz += dx * 0.0048;

      state.drag.lastX = pos.x;
      state.drag.lastY = pos.y;
      const t = performance.now();
      state.drag.samples.push({ x: pos.x, y: pos.y, t });
      while (state.drag.samples.length > 10 || (state.drag.samples.length > 2 && t - state.drag.samples[0].t > 150)) {
        state.drag.samples.shift();
      }
      renderSpinner(spinner);
    });

    function releaseDrag(event) {
      if (!state.drag) return;
      const spinner = state.spinners.find(s => s.id === state.drag.id);
      if (spinner) {
        spinner.grabbed = false;
        const samples = state.drag.samples;
        const first = samples[0];
        const last = samples[samples.length - 1];
        const dt = Math.max(16, last.t - first.t);
        const vx = ((last.x - first.x) / dt) * 1080;
        const vy = ((last.y - first.y) / dt) * 1080;
        spinner.vx = clamp(vx, -1500, 1500);
        spinner.vy = clamp(vy, -1500, 1500);
        const speed = Math.hypot(spinner.vx, spinner.vy);
        spinner.vrz = clamp(spinner.vx * 0.0018 + spinner.vy * 0.0009, -8.5, 8.5);
        spinner.vrx = clamp(-spinner.vy * 0.00095, -4.4, 4.4);
        spinner.vry = clamp(spinner.vx * 0.00095, -4.4, 4.4);
        if (speed > 140) state.throwLevel = clamp(state.throwLevel + Math.min(0.18, speed / 6000), 0, 1);
      }
      state.drag = null;
      if (event && renderer.domElement.hasPointerCapture(event.pointerId)) {
        renderer.domElement.releasePointerCapture(event.pointerId);
      }
    }

    renderer.domElement.addEventListener('pointerup', releaseDrag);
    renderer.domElement.addEventListener('pointercancel', releaseDrag);

    renderer.domElement.addEventListener('dblclick', (event) => {
      const pos = pointerPos(event);
      const source = findSpinnerAt(pos.x, pos.y);
      if (!source) return;
      const clone = createSpinner({
        x: clamp(source.x + rand(-34, 34), 70, state.width - 70),
        y: clamp(source.y + rand(-24, 24), 70, state.height - 70),
        vx: rand(-120, 120),
        vy: rand(-120, 120),
        rx: source.rx + rand(-0.12, 0.12),
        ry: source.ry + rand(-0.12, 0.12),
        rz: source.rz + rand(-0.25, 0.25),
        vrx: rand(-0.6, 0.6),
        vry: rand(-0.6, 0.6),
        vrz: rand(-1.6, 1.6),
      });
      renderSpinner(clone);
    });

    function solveCollisions() {
      const restitution = 0.9;
      for (let i = 0; i < state.spinners.length; i++) {
        const a = state.spinners[i];
        if (state.drag && state.drag.id === a.id) continue;
        for (let j = i + 1; j < state.spinners.length; j++) {
          const b = state.spinners[j];
          if (state.drag && state.drag.id === b.id) continue;
          const dx = b.x - a.x;
          const dy = b.y - a.y;
          let dist = Math.hypot(dx, dy);
          const minDist = a.radius + b.radius;
          if (dist === 0) dist = 0.0001;
          if (dist >= minDist) continue;
          const nx = dx / dist;
          const ny = dy / dist;
          const overlap = minDist - dist;
          a.x -= nx * overlap * 0.5;
          a.y -= ny * overlap * 0.5;
          b.x += nx * overlap * 0.5;
          b.y += ny * overlap * 0.5;
          const rvx = b.vx - a.vx;
          const rvy = b.vy - a.vy;
          const velAlongNormal = rvx * nx + rvy * ny;
          if (velAlongNormal > 0) continue;
          const impulse = -(1 + restitution) * velAlongNormal / 2;
          const ix = impulse * nx;
          const iy = impulse * ny;
          a.vx -= ix;
          a.vy -= iy;
          b.vx += ix;
          b.vy += iy;
          a.vrz -= (iy - ix) * 0.0015;
          b.vrz += (iy - ix) * 0.0015;
          a.vrx += ny * 0.25;
          b.vrx -= ny * 0.25;
          a.vry -= nx * 0.25;
          b.vry += nx * 0.25;

          const impact = Math.abs(velAlongNormal);
          if (impact > 45) {
            spawnCollisionText((a.x + b.x) * 0.5, (a.y + b.y) * 0.5, impact / 120);
          }
        }
      }
    }

    function update(dt) {
      state.bgBlend += (state.throwLevel - state.bgBlend) * 0.04;
      state.throwLevel *= 0.996;
      setThemeFromBlend(state.bgBlend);

      const linearDamping = Math.pow(0.985, dt * 60);
      const angularDamping = Math.pow(0.978, dt * 60);
      const wallBounce = 0.86;

      for (const spinner of state.spinners) {
        const dragging = state.drag && state.drag.id === spinner.id;
        if (!dragging) {
          spinner.vx *= linearDamping;
          spinner.vy *= linearDamping;
          spinner.vrx *= angularDamping;
          spinner.vry *= angularDamping;
          spinner.vrz *= angularDamping;
          if (Math.abs(spinner.vx) < 1.2) spinner.vx = 0;
          if (Math.abs(spinner.vy) < 1.2) spinner.vy = 0;
          if (Math.abs(spinner.vrx) < 0.003) spinner.vrx = 0;
          if (Math.abs(spinner.vry) < 0.003) spinner.vry = 0;
          if (Math.abs(spinner.vrz) < 0.004) spinner.vrz = 0;
          spinner.x += spinner.vx * dt;
          spinner.y += spinner.vy * dt;
          spinner.rx = clamp(spinner.rx + spinner.vrx * dt * 60, -1.4, 1.4);
          spinner.ry = clamp(spinner.ry + spinner.vry * dt * 60, -1.4, 1.4);
          spinner.rz += spinner.vrz * dt * 60;
        }

        if (spinner.x < spinner.radius) {
          const wallImpact = Math.abs(spinner.vx);
          spinner.x = spinner.radius;
          spinner.vx = Math.abs(spinner.vx) * wallBounce;
          spinner.vrz += 0.35;
          if (wallImpact > 55) spawnCollisionText(spinner.radius + 10, spinner.y, wallImpact / 140);
        } else if (spinner.x > state.width - spinner.radius) {
          const wallImpact = Math.abs(spinner.vx);
          spinner.x = state.width - spinner.radius;
          spinner.vx = -Math.abs(spinner.vx) * wallBounce;
          spinner.vrz -= 0.35;
          if (wallImpact > 55) spawnCollisionText(state.width - spinner.radius - 10, spinner.y, wallImpact / 140);
        }
        if (spinner.y < spinner.radius) {
          const wallImpact = Math.abs(spinner.vy);
          spinner.y = spinner.radius;
          spinner.vy = Math.abs(spinner.vy) * wallBounce;
          spinner.vrx += 0.24;
          if (wallImpact > 55) spawnCollisionText(spinner.x, spinner.radius + 10, wallImpact / 140);
        } else if (spinner.y > state.height - spinner.radius) {
          const wallImpact = Math.abs(spinner.vy);
          spinner.y = state.height - spinner.radius;
          spinner.vy = -Math.abs(spinner.vy) * wallBounce;
          spinner.vrx -= 0.24;
          if (wallImpact > 55) spawnCollisionText(spinner.x, state.height - spinner.radius - 10, wallImpact / 140);
        }
      }

      solveCollisions();
      state.spinners.forEach(renderSpinner);
    }

    function resize() {
      state.width = window.innerWidth;
      state.height = window.innerHeight;
      renderer.setSize(state.width, state.height);
      camera.left = state.width / -2;
      camera.right = state.width / 2;
      camera.top = state.height / 2;
      camera.bottom = state.height / -2;
      camera.updateProjectionMatrix();
      const scale = state.width < 760 ? 0.252 : 0.332;
      state.spinners.forEach(spinner => {
        spinner.scale = scale;
        spinner.scaleX = scale * 0.912;
        spinner.scaleY = scale * 1.092;
        spinner.scaleZ = scale * 0.952;
        spinner.radius = SHAPE_BOUNDS.width * scale * 0.48 * 0.936;
        spinner.thickness = 10.6 * scale;
        spinner.x = clamp(spinner.x, spinner.radius, state.width - spinner.radius);
        spinner.y = clamp(spinner.y, spinner.radius, state.height - spinner.radius);
        renderSpinner(spinner);
      });
    }

    window.addEventListener('resize', resize);

    // one initial spinner only
    createSpinner({
      x: window.innerWidth * 0.53,
      y: window.innerHeight * 0.58,
      rx: -0.55,
      ry: 0.35,
      rz: -0.82,
    });
    setThemeFromBlend(0);

    function animate(now) {
      const dt = Math.min(0.033, (now - state.lastTime) / 1000 || 0.016);
      state.lastTime = now;
      update(dt);
      updateCollisionTexts(now);
      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }
    requestAnimationFrame(animate);
  </script>
</body>
</html>
